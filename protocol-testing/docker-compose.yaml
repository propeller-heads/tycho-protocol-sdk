services:
  db:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    image: protocol-testing-db:latest
    restart: "always"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: mypassword
      POSTGRES_USER: postgres
      POSTGRES_DB: ${DB_NAME:-tycho_indexer_0}
    command: postgres -c shared_preload_libraries=pg_partman_bgw,pg_cron -c cron.database_name=${DB_NAME:-tycho_indexer_0}
    ports:
      - "5433:5432"
    shm_size: "1gb"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_historical_partitions.sql:/docker-entrypoint-initdb.d/01_init_historical_partitions.sql:ro

  test-runner:
    image: protocol-testing-test-runner:latest
    depends_on:
      db:
        condition: service_healthy
      indexer:
        condition: service_healthy
    environment:
      RUST_LOG: "${RUST_LOG:-error,protocol_testing=info,tycho_indexer=info,tycho_client=info}"
      DATABASE_URL: postgres://postgres:mypassword@db:5432/${DB_NAME:-tycho_indexer_0}
      RPC_URL: "${RPC_URL:-https://lb.drpc.live/ethereum/AhWtsxH3UU0ouxmDERKpMgZ_Cc_4paER8IKjwg8TMB_n}"
      SUBSTREAMS_API_TOKEN: "${SUBSTREAMS_API_TOKEN}"
      TYCHO_URL: http://indexer:4242
      AUTH_API_KEY: dummy
    # PROTOCOLS to test separated by space and with optional filter
    # e.g. "ethereum-balancer-v2=weighted_legacy_creation ethereum-ekubo-v2"
    entrypoint: [ "/entrypoint.sh", "${PROTOCOL:-${PROTOCOLS}}" ]
    volumes:
      - ../substreams:/app/substreams

  indexer:
    image: protocol-testing-test-runner:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUST_LOG: "${RUST_LOG:-error,protocol_testing=info,tycho_indexer=info,tycho_client=info}"
      DATABASE_URL: postgres://postgres:mypassword@db:5432/${DB_NAME:-tycho_indexer_0}
      AUTH_API_KEY: dummy
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4242' 2>/dev/null && exit 0 || exit 1" ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "4242:4242"
    entrypoint: [ "tycho-indexer", "--database-url", "postgres://postgres:mypassword@db:5432/tycho_indexer_0", "--rpc-url", "${RPC_URL:-https://lb.drpc.live/ethereum/AhWtsxH3UU0ouxmDERKpMgZ_Cc_4paER8IKjwg8TMB_n}", "rpc" ]


volumes:
  postgres_data:
